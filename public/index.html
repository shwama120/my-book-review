<!DOCTYPE html>
<html>
<head>
    <!-- 웹 브라우저 탭에 표시될 페이지의 제목을 설정합니다. -->
    <title>책 리뷰</title>
</head>
<body>
    <!-- 페이지 최상단에 큰 제목을 표시합니다. -->
    <h1>책 리뷰</h1>
    
    <!-- 사용자에게 입력받은 리뷰 데이터를 '/api/reviews' 경로로 전송(POST방식)하는 폼 태그입니다. -->
    <form action="/api/reviews" method="POST">
        <!-- 리뷰할 작품의 제목을 입력받는 칸입니다. 필수(required)로 입력해야 합니다. -->
        <input type="text" name="title" placeholder="제목" required><br>
        
        <!-- 작가의 이름을 입력받는 칸입니다. -->
        <input type="text" name="author" placeholder="작가"><br>
        
        <!-- '도서'와 '웹툰' 중 하나를 선택할 수 있는 드롭다운 메뉴입니다. -->
        <select name="category"><option>도서</option><option>웹툰</option></select><br>
        
        <!-- 1점에서 5점 사이의 숫자만 입력할 수 있는 평점 입력 칸입니다. -->
        <input type="number" name="rating" min="1" max="5" placeholder="평점">
        
        <!-- 긴 텍스트 형태로 한 줄 평(리뷰 내용)을 입력받는 영역입니다. -->
        <textarea name="review" placeholder="한 줄 평"></textarea><br>
        
        <!-- 작성한 리뷰 데이터를 서버로 전송하는 등록 버튼입니다. -->
        <button type="submit">등록</button>
    </form>
    
    <!-- 서버에서 가져온 리뷰 목록 데이터가 동적으로 추가될 빈 그릇(데이터 출력 영역)입니다. -->
    <div id="list"></div>

    <script>
    // 서버('/api/reviews')에 저장된 리뷰 데이터를 가져오기 위해 GET 요청을 보냅니다.
    fetch('/api/reviews')
        // 서버로부터 받은 응답(res)을 JavaScript 객체(JSON) 형태로 변환합니다.
        .then(res => res.json())
        // 변환 완료된 데이터(data)를 사용해 화면에 리뷰 목록을 출력합니다.
        .then(data => {
            // 리뷰 카드들을 삽입할 부모 HTML 요소(div id="list")를 탐색합니다.
            const list = document.getElementById('list');
            
            // 배열 형태의 리뷰 데이터 개수만큼 반복문을 실행합니다.
            data.forEach(r => {
                // 기존 목록 뒤에 새로운 리뷰 템플릿 코드(제목, 평점, 내용)를 누적하여 삽입합니다.
                list.innerHTML += `<div><h3>${r.title} (${r.rating})</h3><p>${r.review}</p></div>`;
            });
        });
</script>

</body>
</html>
